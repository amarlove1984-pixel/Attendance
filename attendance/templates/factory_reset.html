{% extends 'base.html' %}

{% block content %}

<div class="card border-danger">

    <div class="card-header bg-danger text-white">
        Factory Reset
    </div>

    <div class="card-body">

        <h4>Warning!</h4>

        <p>
            This will permanently delete ALL attendance records.
        </p>

        <form method="post">

            {% csrf_token %}

            <button class="btn btn-danger">
                Delete Everything
            </button>

            <a href="{% url 'dashboard' %}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
