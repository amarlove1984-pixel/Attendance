{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="card">

<div class="card-header bg-success text-white">
Promote Students
</div>

<div class="card-body">

<form method="post">

{% csrf_token %}

<label>Current Semester</label>

<select name="old_semester"
            class="form-control mb-3">

{% for s in semesters %}
<option value="{{ s.id }}">
{{ s.name }}
</option>
{% endfor %}

</select>

<label>Move To Semester</label>

<select name="new_semester"
        class="form-control mb-3">

{% for s in semesters %}
<option value="{{ s.id }}">
{{ s.name }}
</option>
{% endfor %}
<form method="post">
    {% csrf_token %}

    <label>From Semester</label>
    <select name="old_semester">
        {% for sem in semesters %}
            <option value="{{ sem.id }}">
                {{ sem }}
            </option>
        {% endfor %}
    </select>

    <label>To Semester</label>
    <select name="new_semester">
        {% for sem in semesters %}
            <option value="{{ sem.id }}">
                {{ sem }}
            </option>
        {% endfor %}
    </select>

    <button type="submit"
            class="btn btn-success">
        Promote All Students
    </button>
</form>

</select>

<button class="btn btn-success">
Promote Students
</button>

</form>

</div>

</div>

</div>

{% endblock %}
