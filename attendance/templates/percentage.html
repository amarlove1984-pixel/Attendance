{% extends 'base.html' %}

{% block content %}

<h2>Attendance Percentage</h2>

<table class="table">

<tr>
<th>Student</th>
<th>Present</th>
<th>Total</th>
<th>%</th>
</tr>

{% for s in students %}

<tr class="table-{{ s.color }}">

<td>{{ s.student.name }}</td>

<td>{{ s.present }}</td>

<td>{{ s.total }}</td>

<td>{{ s.percentage }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
