{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="card">

<div class="card-header bg-warning">
Delete Semester Students
</div>

<div class="card-body">

<form method="post">

{% csrf_token %}

<label>Select Semester</label>

<select name="semester"
        class="form-control mb-3">

{% for s in semesters %}
<option value="{{ s.id }}">
{{ s.name }}
</option>
{% endfor %}

</select>

<button class="btn btn-danger"
onclick="return confirm(
'All students of this semester will be deleted. Continue?')">

Delete Students

</button>

</form>

</div>

</div>

</div>

{% endblock %}
