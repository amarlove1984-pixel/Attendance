{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card mt-5">

            <div class="card-header bg-primary text-white">
                <h3>Set New Password</h3>
            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-success w-100">

                        Change Password

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
